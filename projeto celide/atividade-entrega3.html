<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>start game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
        }

        header {
            width: 100%;
            height: 70vh;

            background: 
            linear-gradient(rgba(0,0,0,0.7), rgba(138,43,226,0.4)),
            url("https://images.unsplash.com/photo-1511512578047-dfb367046420");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;

            border-bottom: 8px solid #8a2be2;
        }

        header h1 {
            font-size: 4em;
            text-transform: uppercase;
            text-shadow: 3px 3px 10px #000;
        }

        header p {
            margin-top: 10px;
            font-size: 1.3em;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
        }

        .main-content {
            width: 90%;
            max-width: 1200px;
            margin: -50px auto 30px auto;
            background: #1a1f29;
            padding: 30px;
            border-radius: 15px;
        }

        .game-card {
            width: 46%;
            margin: 2%;
            float: left;
            background: #252a35;
            padding: 20px;
            border-radius: 10px;
        }

        .game-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .game-card h3 {
            margin-top: 10px;
            color: #a155ff;
        }

        .btn-play {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #8a2be2;
            color: white;
            text-decoration: none;
            border-radius: 20px;
        }

        footer {
            clear: both;
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background: #000;
        }
    </style>
</head>

<body>

<header>
    <h1>Start Game</h1>
    <p>Domine seu código, construa o universo</p>
</header>

<div class="main-content">
    <h2>Atividades disponíveis</h2>

    <div class="game-card">
        <img src="https://i.pinimg.com/736x/bd/66/71/bd6671b314f35b02f3801058889dd4d6.jpg">
        <h3>Boss: Sistema Operacional</h3>
        <p>Entenda como o sistema gerencia o hardware.</p>
        <a href="#" class="btn-play">Iniciar</a>
    </div>

    <div class="game-card">
        <img src="https://tse1.explicit.bing.net/th/id/OIP.jkjnIHzBFj7EfttGyhoGEgHaHa">
        <h3>XP: Responsividade</h3>
        <p>Aprenda a adaptar seu site para qualquer tela.</p>
        <a href="#" class="btn-play">Começar</a>
    </div>

    <footer>
        <p>Game over? Continue codando.</p>
    </footer>
</div>

</body>
</html>

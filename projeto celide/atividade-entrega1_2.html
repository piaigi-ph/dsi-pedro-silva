<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css moderno</title>
</head>
<style>
    body {
        background-color: #d3d3d3;
        background-image: url('pedra.jpg');
        font-family: Arial, sans-serif;
    }

    .texto-azul {
        color:  blue rgb (0, 11, 128);
        font-size: 24px;
        font-weight: bold;
    }

    table {
      border: 2px solid black;
      border-collapse: collapse;
      width: 50%;
      margin: 0 auto;
    }

    table td {
        border: 1px solid black;
        padding: 10px;
        text-align: center;
    }

    img {
        border: 3px solid #000;
    }

    .coluna-numerica {
        text-align: right;
        font-family: 'Courier New',  monospace;
    }
</style>

<body>
    <div style="text-align: center;">
        <p class="texto-azul">status do personagem: porco da mega sena</p>

        <table>
            <tr>
                <td colspan="2">
                    <span class="texto-azul">guerreiro nivel max</span>
                </td>
            </tr>
            <tr>
                <td>
                    <img src="poco.webp" alt="avatar">
                </td>
                <td class="coluna-numerica">
                    força: +8000 <br>
                    agilidade: depende da chinela
                     perks: "gira gira gira rodinha" nivel 500, "destruidor de sonhos" nivel 800, "matadouro" nivel max. 
                </td>
            </tr>
        </table>
    </div>
</body>
